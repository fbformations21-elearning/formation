async function supa(method,table,body=null,filter=''){
  const res=await fetch(`${SUPA_URL}/rest/v1/${table}${filter}`,{
    method,
    headers:{'Content-Type':'application/json','apikey':SUPA_KEY,'Authorization':'Bearer '+SUPA_KEY,'Prefer':method==='POST'?'return=representation':''},
    body:body?JSON.stringify(body):null
  });
  if(!res.ok){const e=await res.text();throw new Error(e);}
  if(res.status===204)return null;
  return res.json();
}

function setStep(n,state,text){
  const icons={wait:'s-wait',load:'s-load',ok:'s-ok',err:'s-err'};
  const labels={wait:n,load:'⟳',ok:'✓',err:'✗'};
  const el=document.getElementById('i'+n);
  el.className='step-icon '+icons[state];
  el.textContent=labels[state];
  if(text){const s=document.getElementById('s'+n);s.querySelector('div:last-child').textContent=text;}
}

function showStatus(msg,type){
  const s=document.getElementById('status');
  s.style.display='block';
  s.className='status '+type;
  s.innerHTML=msg;
}

async function installer(){
  const btn=document.getElementById('btn');
  btn.disabled=true;btn.textContent='Installation en cours...';
  document.getElementById('steps').style.display='block';

  try{
    // Étape 1 - Connexion
    setStep(1,'load','Connexion à Supabase...');
    await new Promise(r=>setTimeout(r,500));
    setStep(1,'ok','Connexion établie ✓');

    // Étape 2 - Vérification
    setStep(2,'load','Vérification de la base de données...');
    const existing=await supa('GET','formations','',`?select=id&data->>title=eq.Vidéosurveillance et Vidéoprotection`);
    if(existing&&existing.length>0){
      setStep(2,'ok','Formation déjà présente');
      setStep(3,'ok','Insertion ignorée (déjà installée)');
      setStep(4,'ok','Installation vérifiée');
      showStatus('✅ La formation est déjà installée dans votre base de données !<br><br>Vous pouvez fermer cette page et utiliser votre <a href="https://fbformations21-elearning.github.io/formation/learnflow-admin.html" style="color:#185FA5">portail admin</a>.','ok');
      btn.textContent='✓ Déjà installé';
      return;
    }
    setStep(2,'ok','Base de données prête ✓');

    // Étape 3 - Insertion
    setStep(3,'load','Insertion de la formation...');
    await supa('POST','formations',{data:FORMATION},'');
    setStep(3,'ok','Formation insérée ✓');

    // Étape 4 - Vérification finale
    setStep(4,'load','Vérification finale...');
    await new Promise(r=>setTimeout(r,500));
    setStep(4,'ok','Installation réussie ✓');

    showStatus('🎉 <strong>Installation réussie !</strong><br><br>La formation Vidéosurveillance et Vidéoprotection (6 modules · 24 parties · 72 questions) est maintenant disponible dans votre base de données.<br><br><a href="https://fbformations21-elearning.github.io/formation/learnflow-admin.html" style="color:#185FA5;font-weight:600">→ Ouvrir le portail admin</a>','ok');
    btn.textContent='✓ Installation terminée';

  }catch(e){
    showStatus('❌ Erreur : '+e.message+'<br><br>Vérifiez votre connexion internet et réessayez.','err');
    btn.disabled=false;btn.textContent='🔄 Réessayer';
    console.error(e);
    const steps=['s1','s2','s3','s4'];
    steps.forEach((s,i)=>{if(document.getElementById('i'+(i+1)).classList.contains('s-load'))setStep(i+1,'err','Erreur');});
  }
}
</script>
